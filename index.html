<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>البوابة التقنية</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        textarea { width: 80%; height: 100px; margin-bottom: 10px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>مرحباً بك في بوابتك التقنية</h1>
    <textarea id="userInput" placeholder="اسألني أي سؤال..."></textarea><br>
    <button onclick="askAI()">إرسال إلى الذكاء الاصطناعي</button>
    <p id="response"></p>

    <script>
        async function askAI() {
            const message = document.getElementById('userInput').value;
            const res = await fetch('/api/chat', { // هذا الرابط سيعمل تلقائياً عند ربط السيرفر
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message })
            });
            const data = await res.json();
            document.getElementById('response').innerText = data.reply;
        }
    </script>
</body>
</html>
