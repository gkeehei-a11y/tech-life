<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>KaliDocs AR | موسوعة كالي لينكس</title>
    <style>
        :root { --bg: #0d1117; --text: #c9d1d9; --accent: #238636; --code-bg: #161b22; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Courier New', Courier, monospace; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        h1 { color: #58a6ff; text-align: center; }
        #searchBar { width: 100%; padding: 15px; border-radius: 8px; border: 1px solid var(--accent); background: var(--code-bg); color: white; font-size: 18px; margin-bottom: 20px; }
        .card { background: var(--code-bg); padding: 15px; margin: 10px 0; border-left: 5px solid var(--accent); border-radius: 4px; }
        .command { color: #f85149; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>KaliDocs AR - دليل المحترفين</h1>
        <input type="text" id="searchBar" placeholder="ابحث عن أمر (مثال: nmap -sS)..." onkeyup="filterCommands()">
        <div id="results">
            <div class="card">
                <h3>فحص الـ SYN المتخفي</h3>
                <p>يستخدم لعدم إكمال المصافحة الثلاثية لتجنب السجلات.</p>
                <code class="command">nmap -sS [Target]</code>
            </div>
            </div>
    </div>

    <script>
        function filterCommands() {
            let input = document.getElementById('searchBar').value.toLowerCase();
            let cards = document.getElementsByClassName('card');
            for (let i = 0; i < cards.length; i++) {
                cards[i].style.display = cards[i].innerText.toLowerCase().includes(input) ? "" : "none";
            }
        }
    </script>
</body>
</html>
